<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- viewport-fit=cover so the dark background reaches under the notch /
         home indicator when installed to the home screen -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>ScoreClash</title>
    <meta name="description" content="NFL season prediction league — pick every game, climb the standings." />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Installable app ("Add to Home Screen"): the manifest drives Android /
         Chrome, while iOS Safari ignores it and reads the apple-* tags. -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#07070b" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ScoreClash" />
    <meta name="mobile-web-app-capable" content="yes" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
